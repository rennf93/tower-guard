name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: |
            Thanks for opening your first issue on **tower-guard-rs**!

            To help us triage quickly, please make sure your report includes:
            - A clear reproduction (a short Rust snippet or failing test is ideal)
            - Output of `rustc --version && cargo --version`
            - The feature flags you're building with (`cargo build --no-default-features --features ...`)
            - The tower / hyper version you're targeting and the tokio runtime details
            - Operating system + relevant logs / backtraces / panic messages

            A few pointers:
            - Read [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md) for the bug-report and enhancement guidelines.
            - We follow the [Contributor Covenant Code of Conduct](../blob/master/CODE_OF_CONDUCT.md).
            - **Security vulnerability?** Do **not** open a public issue — please follow [SECURITY.md](../blob/master/SECURITY.md) and use GitHub's private vulnerability reporting.

            Thanks again — a maintainer will be with you soon.
        pr-message: |
            Thanks for opening your first pull request on **tower-guard-rs**!

            Quick checklist before review (most of these are enforced by CI, but worth a glance):
            - [ ] `cargo fmt --check`
            - [ ] `cargo clippy --all-features --all-targets -- -D warnings`
            - [ ] `cargo test --all-features` — full test suite passes
            - [ ] `RUSTDOCFLAGS="-D warnings" cargo doc --all-features --no-deps` is clean
            - [ ] New public items have rustdoc with fully qualified intra-doc links
            - [ ] No `#[allow(...)]` in `src/`, no `// TODO` / `// FIXME` in committed code
            - [ ] Added an entry under `## Unreleased` in [CHANGELOG.md](../blob/master/CHANGELOG.md)
            - [ ] If the change involves engine logic, the corresponding fix landed in `guard-core-rs` first

            See [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md) for the full workflow and the [Code of Conduct](../blob/master/CODE_OF_CONDUCT.md) for the community standards we follow.

            Welcome aboard — a maintainer will review shortly.
